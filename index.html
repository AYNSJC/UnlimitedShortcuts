<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #202124;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .search-container {
      margin: 40px 0;
      position: relative;
      width: 500px;
      max-width: 90vw;
    }

    .search-bar {
      width: 100%;
      padding: 12px 20px;
      border-radius: 24px;
      border: none;
      outline: none;
      font-size: 18px;
      background-color: #303134;
      color: white;
      box-sizing: border-box;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: #303134;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      max-height: 300px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .suggestion {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #444;
    }

    .suggestion:hover {
      background-color: #3c4043;
    }

    .suggestion:last-child {
      border-bottom: none;
    }

    .suggestion-icon {
      width: 16px;
      height: 16px;
      opacity: 0.6;
    }

    .suggestion-text {
      flex: 1;
      font-size: 16px;
    }

    .groups {
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .group {
      background-color: #2e2f31;
      border-radius: 16px;
      padding: 16px;
      transition: 0.3s ease;
      position: relative;
    }

    .group.drag-over {
      background-color: #3a4043;
      transform: scale(1.02);
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .group-name {
      flex: 1;
      font-size: 16px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background-color: #444;
      color: white;
    }

    .collapse-btn,
    .delete-group {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .group-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 12px;
      min-height: 50px;
      padding: 8px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .shortcut-grid.drag-over {
      background-color: #3c4043;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      position: relative;
      border-radius: 8px;
      padding: 4px;
      transition: transform 0.2s;
      user-select: none;
    }

    .shortcut:hover {
      transform: scale(1.05);
    }

    .shortcut.dragging {
      opacity: 0.5;
      transform: rotate(5deg);
    }

    .shortcut img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      pointer-events: none;
    }

    .shortcut-name {
      font-size: 12px;
      color: #ccc;
      background: transparent;
      border: none;
      text-align: center;
      width: 100%;
      cursor: text;
    }

    .shortcut-name:focus {
      outline: 1px solid #4285f4;
      border-radius: 3px;
      background-color: #333;
    }

    .shortcut-delete {
      position: absolute;
      top: -5px;
      right: -5px;
      background-color: #ea4335;
      color: white;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .shortcut:hover .shortcut-delete {
      display: flex;
    }

    .add-shortcut {
      background-color: #3c4043;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      align-self: flex-start;
    }

    .group.collapsed .group-content {
      display: none;
    }

    .add-group {
      background-color: #3c4043;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 20px;
    }

    .drag-placeholder {
      background-color: #444;
      border: 2px dashed #666;
      border-radius: 8px;
      opacity: 0.5;
    }

    /* GitHub button — fixed bottom-right */
    .github-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: #3c4043;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #ccc;
      transition: background-color 0.2s, color 0.2s;
      z-index: 999;
    }
    .github-fab:hover {
      background-color: #555;
      color: white;
    }
    .github-fab svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input class="search-bar" placeholder="Search Google or type a URL" />
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="groups" id="groups"></div>
  <button class="add-group" id="addGroupBtn">+ Add Group</button>

  <!-- GitHub FAB — opens github.html in background tab -->
  <a class="github-fab" id="githubFab" title="GitHub Activity">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
  </a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script>
    const groupsContainer = document.getElementById("groups");
    const addGroupBtn = document.getElementById("addGroupBtn");
    const searchBar = document.querySelector(".search-bar");
    const suggestionsContainer = document.getElementById("suggestions");

    let searchTimeout;

    searchBar.addEventListener("input", (e) => {
      const query = e.target.value.trim();
      clearTimeout(searchTimeout);
      if (query.length === 0) { hideSuggestions(); return; }
      searchTimeout = setTimeout(() => fetchSuggestions(query), query.length === 1 ? 250 : 100);
    });

    searchBar.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const query = searchBar.value.trim();
        if (query) performSearch(query);
      }
      if (e.key === "Escape") { hideSuggestions(); searchBar.blur(); }
    });

    searchBar.addEventListener("blur", () => setTimeout(hideSuggestions, 150));

    async function fetchSuggestions(query) {
      try {
        const script = document.createElement('script');
        const callbackName = 'handleSuggestions';
        window[callbackName] = function(data) {
          showSuggestions(data[1] || []);
          document.body.removeChild(script);
          delete window[callbackName];
        };
        script.src = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}&callback=${callbackName}`;
        document.body.appendChild(script);
        setTimeout(() => {
          if (document.body.contains(script)) { document.body.removeChild(script); delete window[callbackName]; }
        }, 5000);
      } catch (error) { console.log('Suggestions not available'); }
    }

    function showSuggestions(suggestions) {
      suggestionsContainer.innerHTML = '';
      if (suggestions.length === 0) { hideSuggestions(); return; }
      suggestions.slice(0, 8).forEach(suggestion => {
        const div = document.createElement('div');
        div.className = 'suggestion';
        const icon = document.createElement('div');
        icon.innerHTML = '🔍';
        icon.className = 'suggestion-icon';
        const text = document.createElement('div');
        text.className = 'suggestion-text';
        text.textContent = suggestion;
        div.appendChild(icon);
        div.appendChild(text);
        div.addEventListener('click', () => performSearch(suggestion));
        suggestionsContainer.appendChild(div);
      });
      suggestionsContainer.style.display = 'block';
    }

    function hideSuggestions() { suggestionsContainer.style.display = 'none'; }

    function performSearch(query) {
      window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }

    function createGroup(data = { name: "", shortcuts: [] }) {
      const groupDiv = document.createElement("div");
      groupDiv.classList.add("group");

      const header = document.createElement("div");
      header.classList.add("group-header");

      const nameInput = document.createElement("input");
      nameInput.className = "group-name";
      nameInput.placeholder = "Group Name";
      nameInput.value = data.name;

      const collapseBtn = document.createElement("button");
      collapseBtn.className = "collapse-btn";
      collapseBtn.textContent = "▼";

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-group";
      deleteBtn.textContent = "🗑️";

      header.append(nameInput, collapseBtn, deleteBtn);

      const groupContent = document.createElement("div");
      groupContent.className = "group-content";

      const shortcutGrid = document.createElement("div");
      shortcutGrid.className = "shortcut-grid";

      data.shortcuts.forEach(s => shortcutGrid.appendChild(createShortcut(s.url, s.name)));

      const addBtn = document.createElement("button");
      addBtn.className = "add-shortcut";
      addBtn.textContent = "+ Website";

      groupContent.append(addBtn, shortcutGrid);
      groupDiv.append(header, groupContent);
      groupsContainer.appendChild(groupDiv);

      collapseBtn.onclick = () => {
        groupDiv.classList.toggle("collapsed");
        collapseBtn.textContent = groupDiv.classList.contains("collapsed") ? "▶" : "▼";
        saveData();
      };

      deleteBtn.onclick = () => {
        if (confirm("Delete this group and all its shortcuts?")) { groupDiv.remove(); saveData(); }
      };

      nameInput.oninput = saveData;

      addBtn.onclick = () => {
        if (shortcutGrid.children.length >= 10) return;
        const url = prompt("Enter website URL:");
        if (!url) return;
        const name = prompt("Enter site name (optional):") || "Site";
        shortcutGrid.appendChild(createShortcut(url, name));
        saveData();
        updateAddButtonVisibility(shortcutGrid, addBtn);
      };

      new Sortable(shortcutGrid, {
        group: "shortcuts",
        animation: 150,
        ghostClass: "drag-placeholder",
        onStart: evt => evt.item.classList.add("dragging"),
        onEnd: evt => { evt.item.classList.remove("dragging"); updateAllAddButtons(); saveData(); },
        onAdd: evt => { const g = evt.to; updateAddButtonVisibility(g, g.parentElement.querySelector(".add-shortcut")); },
        onRemove: evt => { const g = evt.from; updateAddButtonVisibility(g, g.parentElement.querySelector(".add-shortcut")); }
      });

      updateAddButtonVisibility(shortcutGrid, addBtn);
    }

    function createShortcut(url, name) {
      const div = document.createElement("div");
      div.className = "shortcut";
      div.draggable = true;

      const img = document.createElement("img");
      img.src = "https://www.google.com/s2/favicons?sz=64&domain_url=" + encodeURIComponent(url);

      const nameInput = document.createElement("input");
      nameInput.className = "shortcut-name";
      nameInput.value = name;
      nameInput.oninput = saveData;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "shortcut-delete";
      deleteBtn.innerHTML = "×";
      deleteBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm("Remove this shortcut?")) {
          const grid = div.parentElement;
          const addBtn = grid.parentElement.querySelector(".add-shortcut");
          div.remove();
          updateAddButtonVisibility(grid, addBtn);
          saveData();
        }
      };

      div.append(img, nameInput, deleteBtn);
      div.dataset.url = url;

      // Left-click → same tab
      div.addEventListener("click", (e) => {
        if (e.target === nameInput || e.target === deleteBtn) return;
        window.location.href = url;
      });

      // Middle-click → open in new background tab, stay on this page
      div.addEventListener("mousedown", (e) => {
        if (e.button === 1) {
          e.preventDefault(); // stop browser default middle-click scroll/navigation
          const w = window.open(url, "_blank", "noopener,noreferrer");
          if (w) w.blur();   // keep focus on new tab page
          window.focus();
        }
      });
      // Suppress the browser's own auxclick so it doesn't fire navigation too
      div.addEventListener("auxclick", (e) => { if (e.button === 1) e.preventDefault(); });

      return div;
    }

    function updateAddButtonVisibility(grid, addBtn) {
      addBtn.style.display = grid.children.length >= 10 ? "none" : "block";
    }

    function updateAllAddButtons() {
      document.querySelectorAll(".shortcut-grid").forEach(grid => {
        const addBtn = grid.parentElement.querySelector(".add-shortcut");
        updateAddButtonVisibility(grid, addBtn);
      });
    }

    function saveData() {
      const data = [];
      document.querySelectorAll(".group").forEach(group => {
        const name = group.querySelector(".group-name").value;
        const shortcuts = [...group.querySelectorAll(".shortcut")].map(s => ({
          url: s.dataset.url,
          name: s.querySelector(".shortcut-name").value
        }));
        const collapsed = group.classList.contains("collapsed");
        data.push({ name, shortcuts, collapsed });
      });
      localStorage.setItem("groupsData", JSON.stringify(data));
    }

    function loadData() {
      const data = JSON.parse(localStorage.getItem("groupsData") || "[]");
      data.forEach(group => {
        createGroup(group);
        if (group.collapsed) {
          const lastGroup = groupsContainer.lastElementChild;
          lastGroup.classList.add("collapsed");
          lastGroup.querySelector(".collapse-btn").textContent = "▶";
        }
      });
    }

    addGroupBtn.onclick = () => { createGroup(); saveData(); };

    new Sortable(groupsContainer, {
      handle: ".group-header",
      animation: 150,
      ghostClass: "drag-placeholder",
      onEnd: saveData
    });

    loadData();

    // GitHub FAB — always opens in a background tab, no focus switch
    document.getElementById("githubFab").addEventListener("click", (e) => {
      e.preventDefault();
      const w = window.open("github.html", "_blank", "noopener,noreferrer");
      if (w) w.blur();
      window.focus();
    });
  </script>
</body>
</html>
