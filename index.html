<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #202124;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .search-container {
      margin: 40px 0;
      position: relative;
      width: 500px;
      max-width: 90vw;
    }

    .search-bar {
      width: 100%;
      padding: 12px 20px;
      border-radius: 24px;
      border: none;
      outline: none;
      font-size: 18px;
      background-color: #303134;
      color: white;
      box-sizing: border-box;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: #303134;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      max-height: 300px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .suggestion {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #444;
    }

    .suggestion:hover { background-color: #3c4043; }
    .suggestion:last-child { border-bottom: none; }

    .suggestion-icon { width: 16px; height: 16px; opacity: 0.6; }
    .suggestion-text { flex: 1; font-size: 16px; }

    .groups {
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .group {
      background-color: #2e2f31;
      border-radius: 16px;
      padding: 16px;
      transition: 0.3s ease;
      position: relative;
    }

    .group.drag-over {
      background-color: #3a4043;
      transform: scale(1.02);
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .group-name {
      flex: 1;
      font-size: 16px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background-color: #444;
      color: white;
    }

    .collapse-btn, .delete-group {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .group-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 12px;
      min-height: 50px;
      padding: 8px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .shortcut-grid.drag-over { background-color: #3c4043; }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      position: relative;
      border-radius: 8px;
      padding: 4px;
      transition: transform 0.2s;
      user-select: none;
    }

    .shortcut:hover { transform: scale(1.05); }
    .shortcut.dragging { opacity: 0.5; transform: rotate(5deg); }

    .shortcut img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      pointer-events: none;
    }

    .shortcut-name {
      font-size: 12px;
      color: #ccc;
      background: transparent;
      border: none;
      text-align: center;
      width: 100%;
      cursor: text;
    }

    .shortcut-name:focus {
      outline: 1px solid #4285f4;
      border-radius: 3px;
      background-color: #333;
    }

    .shortcut-delete {
      position: absolute;
      top: -5px;
      right: -5px;
      background-color: #ea4335;
      color: white;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .shortcut:hover .shortcut-delete { display: flex; }

    .add-shortcut {
      background-color: #3c4043;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      align-self: flex-start;
    }

    .group.collapsed .group-content { display: none; }

    .add-group {
      background-color: #3c4043;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 20px;
    }

    .drag-placeholder {
      background-color: #444;
      border: 2px dashed #666;
      border-radius: 8px;
      opacity: 0.5;
    }

    /* ── GitHub FAB ── */
    .github-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: #3c4043;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #ccc;
      transition: background-color 0.2s, color 0.2s;
      z-index: 999;
    }
    .github-fab:hover { background-color: #555; color: white; }
    .github-fab svg { width: 22px; height: 22px; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #2e2f31;
      border-radius: 14px;
      padding: 28px 28px 22px;
      width: 360px;
      max-width: 90vw;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
      color: white;
      margin: 0;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .modal-label {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 0.4px;
    }

    .modal-input {
      background: #3c4043;
      border: 1px solid #555;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      box-sizing: border-box;
    }
    .modal-input:focus { border-color: #4285f4; }
    .modal-input::placeholder { color: #666; }

    .modal-favicon-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 32px;
    }
    .modal-favicon-preview img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: none;
    }
    .modal-favicon-preview span {
      font-size: 12px;
      color: #888;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-btn-cancel {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-btn-cancel:hover { border-color: #888; color: white; }

    .modal-btn-add {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #4285f4;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .modal-btn-add:hover { background: #3574e0; }
    .modal-btn-add:disabled { background: #444; color: #777; cursor: default; }

    .modal-error {
      font-size: 12px;
      color: #ea4335;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input class="search-bar" placeholder="Search Google or type a URL" />
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="groups" id="groups"></div>
  <button class="add-group" id="addGroupBtn">+ Add Group</button>

  <!-- GitHub FAB -->
  <a class="github-fab" id="githubFab" title="GitHub Activity">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
  </a>

  <!-- ADD WEBSITE MODAL -->
  <div class="modal-overlay" id="addSiteModal">
    <div class="modal-box">
      <div class="modal-title">Add Website</div>

      <div class="modal-field">
        <div class="modal-label">URL</div>
        <input class="modal-input" id="siteUrl" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
      </div>

      <div class="modal-favicon-preview">
        <img id="faviconPreview" src="" alt="">
        <span id="faviconStatus">Enter a URL to preview</span>
      </div>

      <div class="modal-field">
        <div class="modal-label">Label</div>
        <input class="modal-input" id="siteName" placeholder="e.g. YouTube" autocomplete="off" />
      </div>

      <div class="modal-error" id="siteError"></div>

      <div class="modal-actions">
        <button class="modal-btn-cancel" id="siteCancel">Cancel</button>
        <button class="modal-btn-add" id="siteAdd">Add</button>
      </div>
    </div>
  </div>

  <!-- ADD GROUP MODAL -->
  <div class="modal-overlay" id="addGroupModal">
    <div class="modal-box">
      <div class="modal-title">New Group</div>

      <div class="modal-field">
        <div class="modal-label">Group Name</div>
        <input class="modal-input" id="groupNameInput" placeholder="e.g. Work, Social, Tools…" autocomplete="off" />
      </div>

      <div class="modal-error" id="groupError"></div>

      <div class="modal-actions">
        <button class="modal-btn-cancel" id="groupCancel">Cancel</button>
        <button class="modal-btn-add" id="groupAdd">Create</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script>
    const groupsContainer = document.getElementById("groups");
    const addGroupBtn     = document.getElementById("addGroupBtn");
    const searchBar       = document.querySelector(".search-bar");
    const suggestionsEl   = document.getElementById("suggestions");

    /* ── SEARCH ── */
    let searchTimeout;
    searchBar.addEventListener("input", (e) => {
      const q = e.target.value.trim();
      clearTimeout(searchTimeout);
      if (!q) { hideSuggestions(); return; }
      searchTimeout = setTimeout(() => fetchSuggestions(q), q.length === 1 ? 250 : 100);
    });
    searchBar.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { const q = searchBar.value.trim(); if (q) performSearch(q); }
      if (e.key === "Escape") { hideSuggestions(); searchBar.blur(); }
    });
    searchBar.addEventListener("blur", () => setTimeout(hideSuggestions, 150));

    function fetchSuggestions(query) {
      const script = document.createElement('script');
      const cb = 'handleSuggestions';
      window[cb] = (data) => {
        showSuggestions(data[1] || []);
        if (document.body.contains(script)) document.body.removeChild(script);
        delete window[cb];
      };
      script.src = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}&callback=${cb}`;
      document.body.appendChild(script);
      setTimeout(() => { if (document.body.contains(script)) { document.body.removeChild(script); delete window[cb]; } }, 5000);
    }

    function showSuggestions(suggestions) {
      suggestionsEl.innerHTML = '';
      if (!suggestions.length) { hideSuggestions(); return; }
      suggestions.slice(0, 8).forEach(s => {
        const div = document.createElement('div');
        div.className = 'suggestion';
        const icon = document.createElement('div'); icon.innerHTML = '🔍'; icon.className = 'suggestion-icon';
        const text = document.createElement('div'); text.className = 'suggestion-text'; text.textContent = s;
        div.appendChild(icon); div.appendChild(text);
        div.addEventListener('click', () => performSearch(s));
        suggestionsEl.appendChild(div);
      });
      suggestionsEl.style.display = 'block';
    }

    function hideSuggestions() { suggestionsEl.style.display = 'none'; }
    function performSearch(q) { window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`; }

    /* ── ADD WEBSITE MODAL ── */
    let _pendingGrid = null;
    let _pendingAddBtn = null;
    let _faviconTimer = null;

    const addSiteModal   = document.getElementById('addSiteModal');
    const siteUrlInput   = document.getElementById('siteUrl');
    const siteNameInput  = document.getElementById('siteName');
    const faviconPreview = document.getElementById('faviconPreview');
    const faviconStatus  = document.getElementById('faviconStatus');
    const siteError      = document.getElementById('siteError');

    function openAddSiteModal(grid, addBtn) {
      _pendingGrid   = grid;
      _pendingAddBtn = addBtn;
      siteUrlInput.value  = '';
      siteNameInput.value = '';
      siteError.textContent = '';
      faviconPreview.style.display = 'none';
      faviconStatus.textContent = 'Enter a URL to preview';
      addSiteModal.classList.add('open');
      setTimeout(() => siteUrlInput.focus(), 50);
    }

    function closeAddSiteModal() { addSiteModal.classList.remove('open'); }

    // Live favicon preview as user types URL
    siteUrlInput.addEventListener('input', () => {
      clearTimeout(_faviconTimer);
      const raw = siteUrlInput.value.trim();
      if (!raw) { faviconPreview.style.display = 'none'; faviconStatus.textContent = 'Enter a URL to preview'; return; }
      _faviconTimer = setTimeout(() => {
        const url = raw.startsWith('http') ? raw : 'https://' + raw;
        // Auto-fill name from hostname if name is empty
        try {
          const host = new URL(url).hostname.replace(/^www\./, '');
          if (!siteNameInput.value) siteNameInput.value = host;
        } catch {}
        const src = `https://www.google.com/s2/favicons?sz=64&domain_url=${encodeURIComponent(url)}`;
        faviconPreview.onload  = () => { faviconPreview.style.display = 'block'; faviconStatus.textContent = ''; };
        faviconPreview.onerror = () => { faviconPreview.style.display = 'none'; faviconStatus.textContent = 'No icon found'; };
        faviconPreview.src = src;
      }, 400);
    });

    function commitAddSite() {
      siteError.textContent = '';
      let url = siteUrlInput.value.trim();
      if (!url) { siteError.textContent = 'Please enter a URL.'; siteUrlInput.focus(); return; }
      if (!url.startsWith('http')) url = 'https://' + url;
      try { new URL(url); } catch { siteError.textContent = 'That doesn\'t look like a valid URL.'; siteUrlInput.focus(); return; }
      const name = siteNameInput.value.trim() || new URL(url).hostname.replace(/^www\./, '');
      _pendingGrid.appendChild(createShortcut(url, name));
      updateAddButtonVisibility(_pendingGrid, _pendingAddBtn);
      saveData();
      closeAddSiteModal();
    }

    document.getElementById('siteAdd').addEventListener('click', commitAddSite);
    document.getElementById('siteCancel').addEventListener('click', closeAddSiteModal);
    addSiteModal.addEventListener('click', (e) => { if (e.target === addSiteModal) closeAddSiteModal(); });
    siteUrlInput.addEventListener('keydown',  (e) => { if (e.key === 'Enter') { e.preventDefault(); siteNameInput.focus(); } if (e.key === 'Escape') closeAddSiteModal(); });
    siteNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commitAddSite(); } if (e.key === 'Escape') closeAddSiteModal(); });

    /* ── ADD GROUP MODAL ── */
    const addGroupModal   = document.getElementById('addGroupModal');
    const groupNameInput  = document.getElementById('groupNameInput');
    const groupError      = document.getElementById('groupError');

    function openAddGroupModal() {
      groupNameInput.value = '';
      groupError.textContent = '';
      addGroupModal.classList.add('open');
      setTimeout(() => groupNameInput.focus(), 50);
    }

    function closeAddGroupModal() { addGroupModal.classList.remove('open'); }

    function commitAddGroup() {
      groupError.textContent = '';
      const name = groupNameInput.value.trim();
      if (!name) { groupError.textContent = 'Please enter a group name.'; groupNameInput.focus(); return; }
      createGroup({ name, shortcuts: [], collapsed: false });
      saveData();
      closeAddGroupModal();
    }

    document.getElementById('groupAdd').addEventListener('click', commitAddGroup);
    document.getElementById('groupCancel').addEventListener('click', closeAddGroupModal);
    addGroupModal.addEventListener('click', (e) => { if (e.target === addGroupModal) closeAddGroupModal(); });
    groupNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commitAddGroup(); } if (e.key === 'Escape') closeAddGroupModal(); });

    addGroupBtn.onclick = () => openAddGroupModal();

    /* ── GROUPS ── */
    function createGroup(data = { name: "", shortcuts: [], collapsed: false }) {
      const groupDiv = document.createElement("div");
      groupDiv.classList.add("group");

      const header = document.createElement("div");
      header.classList.add("group-header");

      const nameInput = document.createElement("input");
      nameInput.className = "group-name";
      nameInput.placeholder = "Group Name";
      nameInput.value = data.name;

      const collapseBtn = document.createElement("button");
      collapseBtn.className = "collapse-btn";
      collapseBtn.textContent = "▼";

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-group";
      deleteBtn.textContent = "🗑️";

      header.append(nameInput, collapseBtn, deleteBtn);

      const groupContent = document.createElement("div");
      groupContent.className = "group-content";

      const shortcutGrid = document.createElement("div");
      shortcutGrid.className = "shortcut-grid";

      data.shortcuts.forEach(s => shortcutGrid.appendChild(createShortcut(s.url, s.name)));

      const addBtn = document.createElement("button");
      addBtn.className = "add-shortcut";
      addBtn.textContent = "+ Website";

      groupContent.append(addBtn, shortcutGrid);
      groupDiv.append(header, groupContent);
      groupsContainer.appendChild(groupDiv);

      if (data.collapsed) {
        groupDiv.classList.add("collapsed");
        collapseBtn.textContent = "▶";
      }

      collapseBtn.onclick = () => {
        groupDiv.classList.toggle("collapsed");
        collapseBtn.textContent = groupDiv.classList.contains("collapsed") ? "▶" : "▼";
        saveData();
      };

      deleteBtn.onclick = () => {
        if (confirm("Delete this group and all its shortcuts?")) { groupDiv.remove(); saveData(); }
      };

      nameInput.oninput = saveData;

      addBtn.onclick = () => {
        if (shortcutGrid.children.length >= 10) return;
        openAddSiteModal(shortcutGrid, addBtn);
      };

      new Sortable(shortcutGrid, {
        group: "shortcuts",
        animation: 150,
        ghostClass: "drag-placeholder",
        onStart: evt => evt.item.classList.add("dragging"),
        onEnd:   evt => { evt.item.classList.remove("dragging"); updateAllAddButtons(); saveData(); },
        onAdd:   evt => { const g = evt.to;   updateAddButtonVisibility(g, g.parentElement.querySelector(".add-shortcut")); },
        onRemove:evt => { const g = evt.from; updateAddButtonVisibility(g, g.parentElement.querySelector(".add-shortcut")); }
      });

      updateAddButtonVisibility(shortcutGrid, addBtn);
    }

    /* ── SHORTCUTS ── */
    function createShortcut(url, name) {
      const div = document.createElement("div");
      div.className = "shortcut";
      div.draggable = true;
      div.dataset.url = url;

      const img = document.createElement("img");
      img.src = "https://www.google.com/s2/favicons?sz=64&domain_url=" + encodeURIComponent(url);

      const nameInput = document.createElement("input");
      nameInput.className = "shortcut-name";
      nameInput.value = name;
      nameInput.oninput = saveData;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "shortcut-delete";
      deleteBtn.innerHTML = "×";
      deleteBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm("Remove this shortcut?")) {
          const grid = div.parentElement;
          const addBtn = grid.parentElement.querySelector(".add-shortcut");
          div.remove();
          updateAddButtonVisibility(grid, addBtn);
          saveData();
        }
      };

      div.append(img, nameInput, deleteBtn);

      // Left-click → same tab
      div.addEventListener("click", (e) => {
        if (e.target === nameInput || e.target === deleteBtn) return;
        window.location.href = url;
      });

      // Middle-click → background new tab, stay here
      div.addEventListener("mousedown", (e) => {
        if (e.button === 1) {
          e.preventDefault();
          const w = window.open(url, "_blank", "noopener,noreferrer");
          if (w) w.blur();
          window.focus();
        }
      });
      div.addEventListener("auxclick", (e) => { if (e.button === 1) e.preventDefault(); });

      return div;
    }

    function updateAddButtonVisibility(grid, addBtn) {
      addBtn.style.display = grid.children.length >= 10 ? "none" : "block";
    }

    function updateAllAddButtons() {
      document.querySelectorAll(".shortcut-grid").forEach(grid => {
        const addBtn = grid.parentElement.querySelector(".add-shortcut");
        updateAddButtonVisibility(grid, addBtn);
      });
    }

    function saveData() {
      const data = [];
      document.querySelectorAll(".group").forEach(group => {
        const name = group.querySelector(".group-name").value;
        const shortcuts = [...group.querySelectorAll(".shortcut")].map(s => ({
          url: s.dataset.url,
          name: s.querySelector(".shortcut-name").value
        }));
        const collapsed = group.classList.contains("collapsed");
        data.push({ name, shortcuts, collapsed });
      });
      localStorage.setItem("groupsData", JSON.stringify(data));
    }

    function loadData() {
      const data = JSON.parse(localStorage.getItem("groupsData") || "[]");
      data.forEach(group => createGroup(group));
    }

    new Sortable(groupsContainer, {
      handle: ".group-header",
      animation: 150,
      ghostClass: "drag-placeholder",
      onEnd: saveData
    });

    loadData();

    // GitHub FAB — background tab, no focus switch
    document.getElementById("githubFab").addEventListener("click", (e) => {
      e.preventDefault();
      const w = window.open("github.html", "_blank", "noopener,noreferrer");
      if (w) w.blur();
      window.focus();
    });
  </script>
</body>
</html>
